name: Validate skill

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install jsonschema
      - run: python3 scripts/validate_skill.py
      - run: python3 -m jsonschema -i tests/fixtures/valid-session.json schemas/session.schema.json
      - run: "! python3 -m jsonschema -i tests/fixtures/invalid-session.json schemas/session.schema.json"
      - run: python3 -m unittest discover -s tests -v
      - name: Check internal resource links
        run: python3 scripts/check_links.py
